name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  workflow_dispatch:

jobs:
  buildWindows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@main

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7

      - name: Restore Previous Cache
        id: cache-build-restore
        uses: actions/cache/restore@main
        with:
          path: |
            .haxelib/
            export/debug/windows/haxe/
            export/debug/windows/obj/
          key: cache-windows-debug

      - name: Set Cache Status
        id: cache-status
        run: echo CACHE_HIT=${{ steps.cache-build-restore.outputs.cache-hit }} | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8
        shell: powershell

      - name: Installing Libraries
        run: haxe --interp -cp ./actions/libs-installer -D analyzer-optimize -main Main

      - name: Rebuild extension-webm
        run: haxelib run lime rebuild extension-webm windows

      - name: Create Version Tag
        run: echo "${{github.run_id}}" > VERSION

      - name: Compile
        run: haxelib run lime build windows -debug

      - name: Clear Previous Cache
        uses: actions/github-script@main
        with:
          script: await require('./actions/cache/clear-cache.js')({github, context}, 'cache-windows-debug');

      - name: Save Current Cache
        uses: actions/cache@main
        with:
          key: cache-windows-debug
          path: |
            .haxelib/
            export/debug/windows/haxe/
            export/debug/windows/obj/
          restore-keys: |
            cache-windows-debug

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: windowsBuild
          path: export/debug/windows/bin
  buildMac:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@main

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7

      - name: Restore Previous Cache
        id: cache-build-restore
        uses: actions/cache/restore@main
        with:
          path: |
            .haxelib/
            export/debug/macos/haxe/
            export/debug/macos/obj/
          key: cache-macos-debug

      - name: Set Cache Status
        id: cache-status
        run: echo "CACHE_HIT=${{ steps.cache-build-restore.outputs.cache-hit }}" >> $GITHUB_ENV

      - name: Installing Libraries
        run: haxe --interp -cp ./actions/libs-installer -D analyzer-optimize -main Main

      - name: Patch hxcpp zlib for Xcode compatibility
        run: |
          ZUTIL_PATH=".haxelib/hxcpp/4,3,2/project/thirdparty/zlib-1.2.11/zutil.h"
          if [ -f "$ZUTIL_PATH" ]; then
            sed -i '' '/define fdopen(fd,mode)/d' "$ZUTIL_PATH"
          fi

      - name: Rebuild extension-webm
        run: haxelib run lime rebuild extension-webm mac

      - name: Fix extension-webm naming for ARM64
        run: |
          mkdir -p .haxelib/extension-webm/git/ndll/MacArm64
          if [ -f ".haxelib/extension-webm/git/ndll/MacArm64/extension-webm-64.ndll" ]; then
            cp .haxelib/extension-webm/git/ndll/MacArm64/extension-webm-64.ndll .haxelib/extension-webm/git/ndll/MacArm64/extension-webm.ndll
          elif [ -f ".haxelib/extension-webm/git/ndll/Mac64/extension-webm.ndll" ]; then
            cp .haxelib/extension-webm/git/ndll/Mac64/extension-webm.ndll .haxelib/extension-webm/git/ndll/MacArm64/extension-webm.ndll
          fi

      - name: Create Version Tag
        run: echo "${{github.run_id}}" > VERSION

      - name: Compile
        run: haxelib run lime build mac -debug

      - name: Clear Previous Cache
        uses: actions/github-script@main
        with:
          script: await require('./actions/cache/clear-cache.js')({github, context}, 'cache-macos-debug');

      - name: Save Current Cache
        uses: actions/cache@main
        with:
          key: cache-macos-debug
          path: |
            .haxelib/
            export/debug/macos/haxe/
            export/debug/macos/obj/
          restore-keys: |
            cache-macos-debug

      - name: Tar files
        run: tar -zcvf build.tar.gz export/debug/macos/bin

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: macosBuild
          path: build.tar.gz
  buildLinux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@main

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7

      - name: Restore Previous Cache
        id: cache-build-restore
        uses: actions/cache/restore@main
        with:
          path: |
            .haxelib/
            export/debug/linux/haxe/
            export/debug/linux/obj/
          key: cache-linux-debug

      - name: Set Cache Status
        id: cache-status
        run: echo "CACHE_HIT=${{ steps.cache-build-restore.outputs.cache-hit }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc-multilib g++-multilib

      - name: Installing Libraries
        run: haxe --interp -cp ./actions/libs-installer -D analyzer-optimize -main Main

      - name: Rebuild extension-webm
        run: haxelib run lime rebuild extension-webm linux

      - name: Create Version Tag
        run: echo "${{github.run_id}}" > VERSION

      - name: Compile
        run: haxelib run lime build linux -debug

      - name: Clear Previous Cache
        uses: actions/github-script@main
        with:
          script: await require('./actions/cache/clear-cache.js')({github, context}, 'cache-linux-debug');

      - name: Save Current Cache
        uses: actions/cache@main
        with:
          key: cache-linux-debug
          path: |
            .haxelib/
            export/debug/linux/haxe/
            export/debug/linux/obj/
          restore-keys: |
            cache-linux-debug

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: linuxBuild
          path: export/debug/linux/bin
  buildAndroid:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@main

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r21e

      - name: Setup Java JDK
        uses: actions/setup-java@v1
        with:
          java-version: 11

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7

      - name: Restore Previous Cache
        id: cache-build-restore
        uses: actions/cache/restore@main
        with:
          path: |
            .haxelib/
            export/debug/android/haxe/
            export/debug/android/obj/
          key: cache-android-debug

      - name: Set Cache Status
        id: cache-status
        run: echo "CACHE_HIT=${{ steps.cache-build-restore.outputs.cache-hit }}" >> $GITHUB_ENV

      - name: Installing Libraries
        run: haxe --interp -cp ./actions/libs-installer -D analyzer-optimize -main Main

      - name: Create Version Tag
        run: echo "${{github.run_id}}" > VERSION
      
      - name: Setup Lime
        run: |
          haxelib run lime setup -alias -y
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME
          haxelib run lime config ANDROID_SETUP true
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Compile
        run: |
          haxelib run lime setup android
          haxelib run lime build android -debug

      - name: Clear Previous Cache
        uses: actions/github-script@main
        with:
          script: await require('./actions/cache/clear-cache.js')({github, context}, 'cache-android-debug');

      - name: Save Current Cache
        uses: actions/cache@main
        with:
          key: cache-android-debug
          path: |
            .haxelib/
            export/debug/android/haxe/
            export/debug/android/obj/
          restore-keys: |
            cache-android-debug

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: androidBuild
          path: export/debug/android/bin/app/build/outputs/apk/debug